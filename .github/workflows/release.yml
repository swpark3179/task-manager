name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - none

jobs:
  # =============================================
  # Prepare release version
  # =============================================
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
      commit_sha: ${{ steps.bump.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version
        id: bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.version_bump }}" != "none" ]; then
            npm version ${{ inputs.version_bump }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")

            # Update tauri.conf.json version
            sed -i 's/"version": "[^"]*"/"version": "'$NEW_VERSION'"/' src-tauri/tauri.conf.json

            git add package.json package-lock.json src-tauri/tauri.conf.json
            git commit -m "chore: bump version to v$NEW_VERSION"
            git push

            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT

  # =============================================
  # Desktop builds (Windows)
  # =============================================
  build-desktop:
    needs: prepare
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Desktop App
        run: npx tauri build --no-bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: ignore

  # =============================================
  # Android APK build
  # =============================================
  build-android:
    needs: prepare
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android target
        run: npx tauri android init
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sign APK
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Using provided Android keystore"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
            STOREPASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            KEYPASS="${{ secrets.ANDROID_KEY_PASSWORD }}"
            ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          else
            echo "No Android keystore provided. Generating a temporary dev keystore..."
            keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US" -storepass "password" -keypass "password"
            STOREPASS="password"
            KEYPASS="password"
            ALIAS="dev"
          fi

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STOREPASS" \
            -keypass "$KEYPASS" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk \
            "$ALIAS"

          # Rename the signed APK
          mv src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          if-no-files-found: ignore

  # =============================================
  # iOS IPA build
  # =============================================
  build-ios:
    needs: prepare
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize iOS target
        run: npx tauri ios init
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Debug Certificate
        run: |
          echo "=== .p12 내용 확인 ==="
          echo "$IOS_CERTIFICATE" | base64 -d > /tmp/cert.p12

          # 임시 키체인 생성 및 인증서 import
          security create-keychain -p "debug" /tmp/debug.keychain-db
          security set-keychain-settings -lut 21600 /tmp/debug.keychain-db
          security unlock-keychain -p "debug" /tmp/debug.keychain-db
          security import /tmp/cert.p12 -k /tmp/debug.keychain-db -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S "apple-tool:,apple:" -s -k "debug" /tmp/debug.keychain-db

          # 현재 키체인 검색 목록에 추가
          security list-keychains -d user -s /tmp/debug.keychain-db $(security list-keychains -d user | tr -d '"')

          echo ""
          echo "=== 코드서명 가능한 Identity ==="
          security find-identity -v -p codesigning /tmp/debug.keychain-db || echo "❌ codesigning identity 없음"

          echo ""
          echo "=== 모든 Identity ==="
          security find-identity -v /tmp/debug.keychain-db || echo "❌ identity 없음"

          echo ""
          echo "=== 인증서 상세 (Subject / Issuer) ==="
          security find-certificate -a -p /tmp/debug.keychain-db | openssl x509 -subject -issuer -dates -noout 2>/dev/null || echo "인증서 파싱 실패"

          echo ""
          echo "=== 인증서 Key Usage ==="
          security find-certificate -a -p /tmp/debug.keychain-db | openssl x509 -text -noout 2>/dev/null | grep -A2 "Key Usage" || echo "Key Usage 없음"

          # 정리
          security delete-keychain /tmp/debug.keychain-db
          rm -f /tmp/cert.p12
        env:
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build iOS IPA
        # Tauri 공식 Manual Signing 방식:
        # IOS_CERTIFICATE, IOS_CERTIFICATE_PASSWORD, IOS_MOBILE_PROVISION 환경변수를
        # 설정하면 Tauri CLI가 자동으로 Manual 서명을 처리함
        # (수동 pbxproj 패치, 프로비저닝 프로파일 설치 불필요)
        # 참고: https://tauri.app/distribute/sign/ios/#manual-signing
        run: npx tauri ios build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE }}

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: ignore

  # =============================================
  # Create Release Page
  # =============================================
  create-release:
    needs: [prepare, build-desktop, build-android, build-ios]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build-desktop.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: "Task Manager ${{ needs.prepare.outputs.tag_name }}"
          body: |
            Task Manager 최신 릴리스입니다.

            다운로드 파일 안내:
            - **Windows**: `.exe` 파일을 다운로드하여 설치 없이 바로 실행하세요.
            - **Android**: `.apk` 파일을 다운로드하여 설치하세요.
            - **iOS**: `.ipa` 파일은 개발용 프로비저닝으로 빌드되었습니다.
          draft: true
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
