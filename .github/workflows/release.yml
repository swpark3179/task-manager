name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - none

jobs:
  # =============================================
  # Prepare release version
  # =============================================
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
      commit_sha: ${{ steps.bump.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version
        id: bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.version_bump }}" != "none" ]; then
            npm version ${{ inputs.version_bump }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")

            # Update tauri.conf.json version
            sed -i 's/"version": "[^"]*"/"version": "'$NEW_VERSION'"/' src-tauri/tauri.conf.json

            git add package.json package-lock.json src-tauri/tauri.conf.json
            git commit -m "chore: bump version to v$NEW_VERSION"
            git push

            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT

  # =============================================
  # Desktop builds (Windows)
  # =============================================
  build-desktop:
    needs: prepare
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Desktop App
        run: npx tauri build --no-bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: ignore

  # =============================================
  # Android APK build
  # =============================================
  build-android:
    needs: prepare
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android target
        run: npx tauri android init
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sign APK
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Using provided Android keystore"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
            STOREPASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            KEYPASS="${{ secrets.ANDROID_KEY_PASSWORD }}"
            ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          else
            echo "No Android keystore provided. Generating a temporary dev keystore..."
            keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US" -storepass "password" -keypass "password"
            STOREPASS="password"
            KEYPASS="password"
            ALIAS="dev"
          fi

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STOREPASS" \
            -keypass "$KEYPASS" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk \
            "$ALIAS"

          # Rename the signed APK
          mv src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          if-no-files-found: ignore

  # =============================================
  # iOS IPA build
  # =============================================
  build-ios:
    needs: prepare
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Import Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Apple Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/temp.mobileprovision
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 -d > "$PROFILE_PATH"

          # PlistBuddy로 바이너리 plist에서 UUID를 정확하게 추출
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i "$PROFILE_PATH"))
          if [ -z "$UUID" ]; then
            echo "Failed to extract UUID from provisioning profile"
            exit 1
          fi

          mv "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Provisioning profile installed: $UUID.mobileprovision"

          # Profile Name도 추출하여 로그 출력
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision))
          echo "Profile Name: $PROFILE_NAME"
          echo "Profile UUID: $UUID"

          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_SPECIFIER=$UUID" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize iOS target
        run: npx tauri ios init
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Patch Xcode project for Manual Signing
        # tauri ios build -- 로 전달되는 인수는 xcodebuild가 아닌 cargo로 전달됨
        # 따라서 tauri ios init 이 생성한 .pbxproj를 직접 수정해야 함
        run: |
          PBXPROJ="src-tauri/gen/apple/task-manager.xcodeproj/project.pbxproj"
          TEAM_ID="${{ secrets.APPLE_DEVELOPMENT_TEAM }}"
          UUID="${{ env.PROVISIONING_PROFILE_UUID }}"

          echo "Patching: $PBXPROJ"
          echo "Team ID : $TEAM_ID"
          echo "Profile UUID: $UUID"

          # Automatic → Manual 서명 방식 변경
          # macOS BSD sed는 -i 뒤에 빈 문자열 '' 필수 (GNU sed와 다름)
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"

          # python3으로 PROVISIONING_PROFILE_SPECIFIER 주입 (sed보다 안정적)
          python3 - <<'PYEOF'
          import os, re

          pbxproj_path = "src-tauri/gen/apple/task-manager.xcodeproj/project.pbxproj"
          team_id = os.environ["APPLE_DEVELOPMENT_TEAM"]
          uuid = os.environ["PROVISIONING_PROFILE_UUID"]

          with open(pbxproj_path, "r") as f:
              content = f.read()

          # CODE_SIGN_STYLE = Manual; 줄 다음에 PROVISIONING_PROFILE_SPECIFIER 삽입
          # (이미 값이 있으면 교체, 없으면 CODE_SIGN_STYLE 줄 뒤에 추가)
          if "PROVISIONING_PROFILE_SPECIFIER" in content:
              content = re.sub(
                  r'PROVISIONING_PROFILE_SPECIFIER = [^;]*;',
                  f'PROVISIONING_PROFILE_SPECIFIER = "{uuid}";',
                  content
              )
          else:
              content = content.replace(
                  "CODE_SIGN_STYLE = Manual;",
                  f'CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{uuid}";'
              )

          # DEVELOPMENT_TEAM이 비어 있으면 채워 넣음
          content = re.sub(
              r'DEVELOPMENT_TEAM = "";',
              f'DEVELOPMENT_TEAM = {team_id};',
              content
          )

          with open(pbxproj_path, "w") as f:
              f.write(content)

          print("pbxproj patched successfully")
          PYEOF
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          PROVISIONING_PROFILE_UUID: ${{ env.PROVISIONING_PROFILE_UUID }}

      - name: Create ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_DEVELOPMENT_TEAM }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.swpark3179.task-manager</key>
              <string>${{ env.PROVISIONING_PROFILE_UUID }}</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "ExportOptions.plist created:"
          cat /tmp/ExportOptions.plist

      - name: Build iOS IPA
        # tauri ios build 는 내부적으로 xcodebuild를 호출함
        # .pbxproj를 패치했으므로 추가 플래그 없이 빌드 가능
        run: npx tauri ios build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: ignore

  # =============================================
  # Create Release Page
  # =============================================
  create-release:
    needs: [prepare, build-desktop, build-android, build-ios]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build-desktop.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: "Task Manager ${{ needs.prepare.outputs.tag_name }}"
          body: |
            Task Manager 최신 릴리스입니다.

            다운로드 파일 안내:
            - **Windows**: `.exe` 파일을 다운로드하여 설치 없이 바로 실행하세요.
            - **Android**: `.apk` 파일을 다운로드하여 설치하세요.
            - **iOS**: `.ipa` 파일은 개발용 프로비저닝으로 빌드되었습니다.
          draft: true
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
