name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - none

jobs:
  # =============================================
  # Prepare release version
  # =============================================
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
      commit_sha: ${{ steps.bump.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version
        id: bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.version_bump }}" != "none" ]; then
            npm version ${{ inputs.version_bump }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")

            # Update tauri.conf.json version
            sed -i 's/"version": "[^"]*"/"version": "'$NEW_VERSION'"/' src-tauri/tauri.conf.json

            git add package.json package-lock.json src-tauri/tauri.conf.json
            git commit -m "chore: bump version to v$NEW_VERSION"
            git push

            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT

  # =============================================
  # Desktop builds (Windows)
  # =============================================
  build-desktop:
    needs: prepare
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Desktop App
        run: npx tauri build --no-bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: ignore

  # =============================================
  # Android APK build
  # =============================================
  build-android:
    needs: prepare
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android target
        run: npx tauri android init
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sign APK
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Using provided Android keystore"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
            STOREPASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            KEYPASS="${{ secrets.ANDROID_KEY_PASSWORD }}"
            ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          else
            echo "No Android keystore provided. Generating a temporary dev keystore..."
            keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US" -storepass "password" -keypass "password"
            STOREPASS="password"
            KEYPASS="password"
            ALIAS="dev"
          fi

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STOREPASS" \
            -keypass "$KEYPASS" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk \
            "$ALIAS"

          # Rename the signed APK
          mv src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          if-no-files-found: ignore

  # =============================================
  # iOS IPA build
  # =============================================
  build-ios:
    needs: prepare
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Import Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Apple Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize iOS target
        run: npx tauri ios init
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build iOS IPA
        run: npx tauri ios build -- CODE_SIGN_STYLE="Manual"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: ignore

  # =============================================
  # Create Release Page
  # =============================================
  create-release:
    needs: [prepare, build-desktop, build-android, build-ios]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build-desktop.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: "Task Manager ${{ needs.prepare.outputs.tag_name }}"
          body: |
            Task Manager 최신 릴리스입니다.

            다운로드 파일 안내:
            - **Windows**: `.exe` 파일을 다운로드하여 설치 없이 바로 실행하세요.
            - **Android**: `.apk` 파일을 다운로드하여 설치하세요.
            - **iOS**: `.ipa` 파일은 개발용 프로비저닝으로 빌드되었습니다.
          draft: true
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
