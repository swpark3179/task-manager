name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - none

jobs:
  # =============================================
  # Prepare release version
  # =============================================
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
      commit_sha: ${{ steps.bump.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version
        id: bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.version_bump }}" != "none" ]; then
            npm version ${{ inputs.version_bump }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")

            # Update tauri.conf.json version
            sed -i 's/"version": "[^"]*"/"version": "'$NEW_VERSION'"/' src-tauri/tauri.conf.json

            git add package.json package-lock.json src-tauri/tauri.conf.json
            git commit -m "chore: bump version to v$NEW_VERSION"
            git push

            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT

  # =============================================
  # Desktop builds (Windows)
  # =============================================
  build-desktop:
    needs: prepare
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Desktop App
        run: npx tauri build --no-bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: ignore

  # =============================================
  # Android APK build
  # =============================================
  build-android:
    needs: prepare
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android target
        run: npx tauri android init
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sign APK
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Using provided Android keystore"
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
            STOREPASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            KEYPASS="${{ secrets.ANDROID_KEY_PASSWORD }}"
            ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          else
            echo "No Android keystore provided. Generating a temporary dev keystore..."
            keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US" -storepass "password" -keypass "password"
            STOREPASS="password"
            KEYPASS="password"
            ALIAS="dev"
          fi

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STOREPASS" \
            -keypass "$KEYPASS" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk \
            "$ALIAS"

          # Rename the signed APK
          mv src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          if-no-files-found: ignore

  # =============================================
  # iOS IPA build
  # =============================================
  build-ios:
    needs: prepare
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize iOS target
        run: npx tauri ios init
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Setup Code Signing
        run: |
          # 1. 키체인 생성 및 설정
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 2. 인증서 import
          echo "$IOS_CERTIFICATE" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm /tmp/cert.p12

          # 3. 키체인 검색 목록에 추가 (기존 키체인 유지!)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # 4. 키 파티션 목록 설정 (codesign 접근 허용)
          security set-key-partition-list -S "apple-tool:,apple:" -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 5. signing identity 확인
          echo "=== Signing Identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # 6. 환경변수 저장
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
        env:
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 -d > /tmp/temp.mobileprovision

          # UUID 추출 및 프로파일 설치
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i /tmp/temp.mobileprovision)")
          cp /tmp/temp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          rm /tmp/temp.mobileprovision

          echo "Provisioning Profile UUID: $UUID"
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV


      - name: Patch Xcode project for Manual Signing
        run: |
          PBXPROJ="src-tauri/gen/apple/task-manager.xcodeproj/project.pbxproj"

          echo "Patching pbxproj for Manual Signing..."

          # Python 스크립트를 파일로 저장 후 실행 (heredoc은 YAML과 충돌)
          cat > /tmp/patch_pbxproj.py << 'PYEOF'
          import os, re, sys
          pbxproj = sys.argv[1]
          team = sys.argv[2]
          uuid = sys.argv[3]
          with open(pbxproj) as f:
              content = f.read()
          def patch(match):
              b = match.group(0)
              pairs = {
                  "CODE_SIGN_STYLE": "Manual",
                  "CODE_SIGN_IDENTITY": '"Apple Distribution"',
                  "PROVISIONING_PROFILE_SPECIFIER": f'"{uuid}"',
              }
              b = re.sub(r'DEVELOPMENT_TEAM = [^;]*;', f'DEVELOPMENT_TEAM = {team};', b)
              for k, v in pairs.items():
                  p = rf'{k} = [^;]*;'
                  if re.search(p, b):
                      b = re.sub(p, f'{k} = {v};', b)
                  else:
                      b = b.replace('buildSettings = {', f'buildSettings = {{\n\t\t\t\t{k} = {v};', 1)
              return b
          content = re.sub(r'buildSettings = \{[^}]+\}', patch, content, flags=re.DOTALL)
          with open(pbxproj, "w") as f:
              f.write(content)
          print("pbxproj patched successfully")
          PYEOF

          python3 /tmp/patch_pbxproj.py "$PBXPROJ" "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" "${{ env.PROVISIONING_PROFILE_UUID }}"

          # 패치 결과 확인
          echo "=== Verification ==="
          grep -n "CODE_SIGN_STYLE\|PROVISIONING_PROFILE_SPECIFIER\|DEVELOPMENT_TEAM" "$PBXPROJ" | head -20

      - name: Build iOS IPA
        # IOS_CERTIFICATE 미설정 → Tauri의 키체인 관리 건너뜀 (수동 키체인 사용)
        # IOS_MOBILE_PROVISION 설정 → Tauri가 export 시 프로비저닝 프로파일 사용
        run: npx tauri ios build --export-method app-store-connect
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE }}

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: ignore

  # =============================================
  # Create Release Page
  # =============================================
  create-release:
    needs: [prepare, build-desktop, build-android, build-ios]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build-desktop.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: "Task Manager ${{ needs.prepare.outputs.tag_name }}"
          body: |
            Task Manager 최신 릴리스입니다.

            다운로드 파일 안내:
            - **Windows**: `.exe` 파일을 다운로드하여 설치 없이 바로 실행하세요.
            - **Android**: `.apk` 파일을 다운로드하여 설치하세요.
            - **iOS**: `.ipa` 파일은 App Store 배포용 프로비저닝으로 빌드되었습니다.
          draft: false
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
