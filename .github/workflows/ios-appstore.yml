name: iOS App Store Deploy

on:
  workflow_dispatch:

jobs:
  deploy-appstore:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download IPA from Latest Release
        run: |
          mkdir -p artifacts
          # tag를 지정하지 않으면 자동으로 최신 릴리스에서 다운로드합니다.
          gh release download \
            --pattern '*.ipa' \
            --dir ./artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate App Store Connect secrets
        run: |
          missing=()
          [ -z "${{ secrets.APPSTORE_ISSUER_ID }}" ] && missing+=("APPSTORE_ISSUER_ID")
          [ -z "${{ secrets.APPSTORE_API_KEY_ID }}" ] && missing+=("APPSTORE_API_KEY_ID")
          [ -z "${{ secrets.APPSTORE_API_PRIVATE_KEY }}" ] && missing+=("APPSTORE_API_PRIVATE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Please add them in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All App Store Connect secrets are configured."

      - name: Resolve IPA path
        id: ipa
        run: |
          IPA_FILE=$(ls artifacts/*.ipa 2>/dev/null | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "::error::No IPA file found in artifacts/"
            exit 1
          fi
          echo "Found IPA: $IPA_FILE"
          echo "path=$IPA_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
